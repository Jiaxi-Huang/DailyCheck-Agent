tasks:
  taobao_checkin:
    name: "淘宝打卡"
    app: "淘宝"
    steps:
      - name: "Open app"
        description: "Find and tap the 淘宝 app icon on home screen"
      - name: "Start check-in"
        description: "Tap the button that starts the daily check session"
      - name: "Open sub page"
        description: "Find and tap the 领淘金币 icon to end sub page"
      - name: "Complete check-in"
        description: "Tap the 点击签到 button that completes the daily check session"
      - name: "Finish"
        description: "Returned to app home, call task_complete"